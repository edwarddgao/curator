app = "art-curator"
primary_region = "iad"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[checks.health]
  type = "http"
  port = 3001
  path = "/health"
  interval = "30s"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
